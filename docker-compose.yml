services:
  postgres:
    image: postgres:17-alpine
    container_name: clicky-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clicky
      POSTGRES_USER: clicky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clicky_local_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=clicky --dbname=clicky"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: clicky-pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: clicky
      DB_USER: clicky
      DB_PASSWORD: ${POSTGRES_PASSWORD:-clicky_local_password}
      AUTH_TYPE: plain
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MAX_PREPARED_STATEMENTS: 100
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: clicky-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clicky-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: clicky
      CLICKHOUSE_USER: clicky
      CLICKHOUSE_PASSWORD: clicky_local_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' --user clicky --password clicky_local_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  clickhouse-migrator:
    image: clickhouse/clickhouse-server:24.8
    container_name: clicky-clickhouse-migrator
    restart: "no"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: clicky
      CLICKHOUSE_USER: clicky
      CLICKHOUSE_PASSWORD: clicky_local_password
    volumes:
      - ./docker/clickhouse/migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/migrations/migrate.sh"]
    depends_on:
      clickhouse:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-alpine
    container_name: clicky-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: clicky
      RABBITMQ_DEFAULT_PASS: clicky_local_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  collector:
    build:
      context: ./collector
    container_name: clicky-collector
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://clicky:clicky_local_password@rabbitmq:5672/
      RABBITMQ_QUEUE: click_events
      DATABASE_URL: postgres://clicky:${POSTGRES_PASSWORD:-clicky_local_password}@pgbouncer:5432/clicky?sslmode=disable&default_query_exec_mode=exec
    ports:
      - "3000:3000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      pgbouncer:
        condition: service_started

  worker:
    build:
      context: ./worker
    container_name: clicky-worker
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://clicky:clicky_local_password@rabbitmq:5672/
      RABBITMQ_QUEUE: click_events
      CLICKHOUSE_DSN: clickhouse://clicky:clicky_local_password@clickhouse:9000/clicky
      BATCH_SIZE: 1000
      FLUSH_INTERVAL: 2s
      MAX_INSERT_ATTEMPTS: 5
      RETRY_INITIAL_DELAY: 1s
      RETRY_MAX_DELAY: 30s
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      clickhouse-migrator:
        condition: service_completed_successfully

  admin:
    build:
      context: ./admin
    container_name: clicky-admin
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_KEY: ${ADMIN_APP_KEY:-base64:AfMVYqY0E5mP2rTJckcM6mEtgm13VblWPMYrt0W1P7A=}
      DB_CONNECTION: pgsql
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_DATABASE: clicky
      DB_USERNAME: clicky
      DB_PASSWORD: ${POSTGRES_PASSWORD:-clicky_local_password}
      DB_SSLMODE: disable
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: database
      CACHE_STORE: database
      COLLECTOR_URL: http://collector:3000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: clicky
      CLICKHOUSE_USERNAME: clicky
      CLICKHOUSE_PASSWORD: clicky_local_password
    command: >
      sh -c "php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      collector:
        condition: service_started
      clickhouse:
        condition: service_healthy
      clickhouse-migrator:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
  rabbitmq-data:
